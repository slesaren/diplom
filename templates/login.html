{% extends "base.html" %}

{% block title %}Вход — LearnTogether{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[80vh]">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-6">
            <i class="fas fa-chalkboard-user text-blue-600 text-4xl"></i>
            <h2 class="text-2xl font-bold mt-2">Добро пожаловать!</h2>
            <p class="text-gray-500 text-sm">Войдите, чтобы продолжить обучение</p>
        </div>

        <form action="/login" method="POST" class="space-y-5">
            <!-- CSRF токен пример -->
            <input type="hidden" name="csrf_token" value="dummy_token">

            <!-- Email или имя пользователя -->
            <div>
                <label for="login" class="block text-sm font-medium text-gray-700 mb-1">Email или имя пользователя</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="login" name="login" required
                           class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                           placeholder="ivan@example.com или ivan_petrov">
                </div>
            </div>

            <!-- Пароль -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="password" name="password" required
                           class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                           placeholder="Ваш пароль">
                    <button type="button" class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Запомнить меня ссылка на восстановление -->
            <div class="flex justify-between items-center">
                <label class="flex items-center">
                    <input type="checkbox" name="remember" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <span class="ml-2 text-sm text-gray-600">Запомнить меня</span>
                </label>
                <a href="/forgot-password" class="text-sm text-blue-600 hover:underline">Забыли пароль?</a>
            </div>


            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition duration-200 flex items-center justify-center">
                <i class="fas fa-sign-in-alt mr-2"></i> Войти
            </button>
        </form>

        <div id="resendForm" style="display: none;" class="mt-4 p-4 bg-yellow-50 rounded-lg">
    <form method="POST" action="{{ url_for('resend_verification') }}">
        <p class="text-sm text-gray-700 mb-3">Введите email для повторной отправки письма подтверждения:</p>
        <input type="email" name="email" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg mb-2"
               placeholder="your@email.com">
        <button type="submit" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white py-2 rounded-lg">
            Отправить повторно
        </button>
    </form>
</div>

<script>
function showResendForm() {
    document.getElementById('resendForm').style.display = 'block';
}
</script>
        <!-- Альтернативный вход
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-500">или</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button class="flex items-center justify-center py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                <i class="fab fa-github text-gray-800 mr-2"></i> GitHub
            </button>
            <button class="flex items-center justify-center py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                <i class="fab fa-google text-red-500 mr-2"></i> Google
            </button>
        </div>-->

        <div class="mt-6 text-center text-sm text-gray-500">
            Нет аккаунта?
            <a href="/register" class="text-blue-600 hover:underline">Зарегистрироваться</a>
        </div>

        <div class="mt-6 border-t pt-4 flex justify-center space-x-4 text-xs text-gray-400">
            <span><i class="fas fa-book-open"></i> Статьи</span>
            <span><i class="fas fa-question-circle"></i> Q&A</span>
            <span><i class="fas fa-users"></i> Сообщества</span>
        </div>
    </div>
</div>

<script>
    // Toggle password visibility
    document.querySelectorAll('.toggle-password').forEach(btn => {
        btn.addEventListener('click', function() {
            const input = this.parentElement.querySelector('input');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    });
</script>
{% endblock %}
