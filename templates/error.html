{% extends "base.html" %}

{% block title %}Сервис недоступен — QArticle{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center">
    <div class="mb-8">
        <i class="fas fa-database text-gray-300 text-8xl"></i>
    </div>
    <h1 class="text-6xl font-bold text-gray-800 mb-4">Технические неполадки</h1>
    <h2 class="text-2xl font-semibold text-gray-600 mb-4">Сервис временно недоступен</h2>
    <p class="text-gray-500 mb-8 max-w-md">
        В данный момент ведутся технические работы. Пожалуйста, зайдите позже.
    </p>
    <div class="flex gap-4">
        <a href="{{ url_for('index') }}" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg transition">
            <i class="fas fa-home mr-2"></i> На главную
        </a>
        <button onclick="setTimeout(() => location.reload(), 5000)" class="border border-gray-300 hover:bg-gray-50 text-gray-700 px-6 py-2 rounded-lg transition">
            <i class="fas fa-clock mr-2"></i> Проверить через 5 секунд
        </button>
    </div>
</div>
{% endblock %}
