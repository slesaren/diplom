{% extends "base.html" %}

{% block title %}Редактировать комментарий{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm p-6">
        <h1 class="text-2xl font-bold mb-4">Редактировать комментарий</h1>
        <form method="POST">
            <textarea name="content" rows="6" class="w-full px-3 py-2 border rounded-lg" required>{{ comment.content }}</textarea>
            <div class="flex justify-end gap-3 mt-4">
                <a href="{{ url_for('post_detail', post_id=comment.post_id) }}" class="px-4 py-2 border rounded-lg">Отмена</a>
                <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-lg">Сохранить</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
